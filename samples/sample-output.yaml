    conflict: "林舟想忘记过去，但信件迫使他重新面对事故。"
    beats:
      - type: "action"
        content: "林舟关掉电脑，听见门缝下传来纸张摩擦声。"
      - type: "action"
        content: "他捡起信封，看到封口处画着一个黑色圆环。"
      - type: "dialogue"
        speaker: "char_001"
        content: "这不可能，那个标记已经消失三年了。"
    adaptation_notes:
      compression: "压缩了原文中大段回忆，用信件和符号直接制造悬念。"
      rationale: "将心理描写转化为可表演的动作和视觉线索。"
