        content: "林舟推门进入咖啡馆，门铃声打破沉默。"
      - type: "dialogue"
        speaker: "char_002"
        content: "你也收到信了，对吗？"
      - type: "dialogue"
        speaker: "char_001"
        content: "你知道寄信的人是谁？"
      - type: "action"
        content: "许曼把便签推到桌中央，黑色圆环正对着林舟。"
    adaptation_notes:
