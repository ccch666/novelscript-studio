    summary: "林舟和许曼找到缺页档案，确认事故记录被人为篡改。"
    conflict: "两人必须在被发现前带走证据。"
    beats:
      - type: "action"
        content: "许曼拉开铁柜，灰尘在手电光里浮起。"
      - type: "dialogue"
        speaker: "char_002"
        content: "这里少了一页。"
      - type: "dialogue"
        speaker: "char_001"
        content: "不是丢了，是有人拿走了。"
      - type: "transition"
        content: "走廊尽头传来钥匙转动的声音。"
    adaptation_notes:
