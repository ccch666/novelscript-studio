<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>NovelScript Studio Demo</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #17201d;
        --muted: #66716d;
        --line: rgba(23, 32, 29, 0.12);
        --surface: rgba(255, 255, 255, 0.82);
        --accent: #117a65;
        --bg: #f7f4ee;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at top left, rgba(17, 122, 101, 0.14), transparent 32rem),
          linear-gradient(135deg, #fbfaf7 0%, var(--bg) 45%, #edf5f1 100%);
      }

      main {
        width: min(1080px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0 56px;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 24px;
        margin-bottom: 18px;
      }

      h1 {
        margin: 0;
        font-size: clamp(28px, 5vw, 56px);
        line-height: 1.03;
        letter-spacing: 0;
      }

      p {
        margin: 10px 0 0;
        max-width: 680px;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.7;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      .meta {
        flex: 0 0 auto;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 12px;
        background: rgba(255, 255, 255, 0.56);
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .player {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #0d1110;
        box-shadow:
          0 24px 80px rgba(23, 32, 29, 0.18),
          0 1px 0 rgba(255, 255, 255, 0.9) inset;
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 10;
        background: #0d1110;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 16px;
      }

      .actions a {
        display: inline-flex;
        align-items: center;
        min-height: 40px;
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 0 14px;
        background: var(--surface);
        color: var(--ink);
        font-size: 14px;
      }

      @media (max-width: 720px) {
        main {
          width: min(100% - 20px, 1080px);
          padding: 28px 0 36px;
        }

        header {
          display: block;
        }

        .meta {
          margin-top: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>NovelScript Studio Demo</h1>
          <p>
            七牛云 x XEngineer 暑期实训营第三批次题目三作品演示：AI 小说转剧本工具。
            本页面支持浏览器在线播放，无需下载或注册网盘。
          </p>
        </div>
        <div class="meta">
          视频格式：MP4 / H.264<br />
          时长：约 1 分 54 秒
        </div>
      </header>

      <section class="player" aria-label="NovelScript Studio demo video">
        <video controls preload="metadata" playsinline>
          <source src="./novelscript-studio-demo.mp4" type="video/mp4" />
          当前浏览器不支持在线播放视频，请使用下方 MP4 直链打开。
        </video>
      </section>

      <nav class="actions" aria-label="Demo links">
        <a href="./novelscript-studio-demo.mp4">打开 MP4 直链</a>
        <a href="https://github.com/ccch666/novelscript-studio">返回 GitHub 仓库</a>
      </nav>
    </main>
  </body>
</html>
